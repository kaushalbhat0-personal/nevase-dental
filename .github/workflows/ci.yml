name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      PYTEST_DATABASE_URL: postgresql+psycopg2://postgres:postgres@127.0.0.1:5432/test_db

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend deps
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run backend tests
        run: |
          cd backend
          pytest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install frontend deps
        run: |
          cd backend/frontend
          npm install

      - name: Lint (no new warnings)
        run: |
          cd backend/frontend
          npm run lint:ci

      - name: Install Playwright browsers
        run: |
          cd backend/frontend
          npx playwright install --with-deps

      - name: Run E2E tests
        env:
          CI: true
        run: |
          cd backend/frontend
          npm run test:e2e
